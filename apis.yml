aid: norwegian-cruise-line
name: Norwegian Cruise Line Holdings
description: >-
  Norwegian Cruise Line Holdings Ltd. (NYSE: NCLH) is a global cruise company
  operating three premium brands: Norwegian Cruise Line (pioneer of Freestyle
  Cruising), Oceania Cruises, and Regent Seven Seas Cruises. The company
  operates a combined fleet of more than 30 ships sailing to over 700
  destinations worldwide. No public developer portal or external API
  offering has been identified for Norwegian Cruise Line Holdings; travel
  agent and global distribution system (GDS) integrations are handled
  through contracted partner programs rather than a self-serve developer API.
